version: 2

builds:
  - main: ./cmd/idpishield
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - format: binary
    name_template: "idpishield-{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: checksums.txt

brews:
  - name: idpishield
    repository:
      owner: pinchtab
      name: homebrew-tap
      branch: "brew-{{ .ProjectName }}-{{ .Version }}"
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
      pull_request:
        enabled: true
        base:
          owner: pinchtab
          name: homebrew-tap
          branch: main
    directory: Formula
    homepage: "https://github.com/pinchtab/idpishield"
    description: "Defense against Indirect Prompt Injection (IDPI) attacks for AI agents"
    license: "MIT"
    test: |
      system "#{bin}/idpishield", "help"
    install: |
      bin.install Dir["idpishield*"].first => "idpishield"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^ci:'
      - '^chore:'

release:
  github:
    owner: pinchtab
    name: idpishield
